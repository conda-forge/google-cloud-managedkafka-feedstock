schema_version: 1

context:
  name: google-cloud-managedkafka
  version: "0.4.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/google_cloud_managedkafka-${{ version }}.tar.gz
  sha256: ae53f50d60d716473adee3019100873912b88fb82380eeae494e879e656ac42e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.11.0,<3.0.0
    - google-api-core-grpc
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    # more restrictive constraint for python >=3.14
    - grpcio >=1.75.1,<2.0.0
    # more restrictive constraint for python >=3.13
    - proto-plus >=1.25.0,<2.0.0
    - protobuf >=4.25.8,<8.0.0

tests:
  - python:
      imports:
        - google.cloud.managedkafka
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: Google Cloud Managedkafka API client library
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-managedkafka
  repository: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-managedkafka
  documentation: https://github.com/googleapis/google-cloud-python/blob/main/packages/google-cloud-managedkafka/README.rst

extra:
  recipe-maintainers:
    - xylar
